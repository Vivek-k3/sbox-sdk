name: Validate
permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        runtime: [node-20, node-22, node-24]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 20.x
        if: matrix.runtime == 'node-20'
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: pnpm

      - name: Use Node.js 22.x
        if: matrix.runtime == 'node-22'
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm

      - name: Use Node.js 24.x
        if: matrix.runtime == 'node-24'
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter sbox-sdk build

  test:
    needs: build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        runtime: [node-20, node-22, node-24]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 20.x
        if: matrix.runtime == 'node-20'
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: pnpm

      - name: Use Node.js 22.x
        if: matrix.runtime == 'node-22'
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm

      - name: Use Node.js 24.x
        if: matrix.runtime == 'node-24'
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter sbox-sdk test

  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter sbox-sdk build

      - name: Check linting and formatting
        run: pnpm check

  types:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types
        run: pnpm types

  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter web build
