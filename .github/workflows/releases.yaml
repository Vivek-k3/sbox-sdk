name: Release

# Auto-publishes sbox-sdk to npm on every merge to `main`.
#
# The bump is a PATCH by default (0.0.1 -> 0.0.2 -> 0.0.3 ...). To cut a minor
# or major instead, put "#minor" or "#major" anywhere in the merge commit
# message (for squash-merges this is the PR title). The job then commits the
# version bump back to main as "chore(release): vX.Y.Z [skip actions]" and tags
# it. "[skip actions]" stops GitHub Actions from re-triggering this workflow, but
# is NOT a Vercel skip token, so Vercel's Git integration still redeploys the
# site (and its version badge) on the bump.
#
# The web app is deployed by Vercel's own Git integration, not here.

permissions:
  contents: write

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    # Skip the workflow's own release commits and any explicit CI-skip request.
    if: >-
      !startsWith(github.event.head_commit.message, 'chore(release):') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, 'skip ci') &&
      !contains(github.event.head_commit.message, 'ci skip')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter sbox-sdk build

      - name: Test
        run: pnpm --filter sbox-sdk test

      - name: Lint & typecheck
        run: |
          pnpm check
          pnpm --filter sbox-sdk types

      - name: Decide version bump
        id: bump
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          level=patch
          if printf '%s' "$MSG" | grep -qiE '#major'; then
            level=major
          elif printf '%s' "$MSG" | grep -qiE '#minor'; then
            level=minor
          fi
          echo "level=$level" >> "$GITHUB_OUTPUT"
          echo "Bump level: $level"

      - name: Bump version
        id: version
        working-directory: packages/sbox-sdk
        run: |
          new=$(npm version "${{ steps.bump.outputs.level }}" --no-git-tag-version)
          echo "version=${new#v}" >> "$GITHUB_OUTPUT"
          echo "New version: $new"

      - name: Publish to npm
        working-directory: packages/sbox-sdk
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit and tag release
        env:
          V: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/sbox-sdk/package.json
          # --no-verify: skip local git hooks (husky). The release is already
          # built/tested/linted above, and the hooks assume a dev toolchain
          # (bun) that isn't present on the runner.
          git commit --no-verify -m "chore(release): v$V [skip actions]"
          git tag -a "v$V" -m "v$V"
          git push origin HEAD:main
          git push origin "v$V"
